<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>매출 관리 앱</title>
<style>
body { background:#111; color:#fff; font-family:sans-serif; padding:20px;}
h1 { color:#00ff88;}
.box { background:#222; padding:15px; margin:10px 0; border-radius:10px;}
input, select { width:100%; padding:10px; margin:5px 0;}
button { padding:10px; background:#00ff88; border:none; font-weight:bold;}
</style>
</head>

<body>

<h1>🔥 매출 관리 앱</h1>

<div class="box">
날짜 <input type="date" id="date">
구분 
<select id="type">
<option value="매출">매출</option>
<option value="지출">지출</option>
</select>

항목
<select id="category">
<option>월세</option>
<option>광고비</option>
<option>전기세</option>
<option>가스비</option>
<option>식비</option>
<option>기타</option>
<option>수입</option>
</select>

금액 <input type="number" id="amount">

<button onclick="save()">저장</button>
</div>

<div class="box">
<h3>📊 결과</h3>
총 매출: <span id="income">0</span><br>
총 지출: <span id="expense">0</span><br>
순이익: <span id="profit">0</span>
</div>

<div class="box">
<h3>🏆 지출 TOP3</h3>
<div id="top3"></div>
</div>

<script>

let data = JSON.parse(localStorage.getItem("data")) || [];

function save(){
    let item = {
        date: document.getElementById("date").value,
        type: document.getElementById("type").value,
        category: document.getElementById("category").value,
        amount: Number(document.getElementById("amount").value)
    };

    data.push(item);
    localStorage.setItem("data", JSON.stringify(data));

    alert("저장 완료");
    update();
}

function update(){
    let income = 0;
    let expense = 0;
    let categorySum = {};

    data.forEach(d=>{
        if(d.type=="매출") income += d.amount;
        else {
            expense += d.amount;
            categorySum[d.category] = (categorySum[d.category]||0) + d.amount;
        }
    });

    document.getElementById("income").innerText = income;
    document.getElementById("expense").innerText = expense;
    document.getElementById("profit").innerText = income - expense;

    let sorted = Object.entries(categorySum)
        .sort((a,b)=>b[1]-a[1])
        .slice(0,3);

    let html = "";
    sorted.forEach(s=>{
        html += s[0] + " : " + s[1] + "<br>";
    });

    document.getElementById("top3").innerHTML = html;
}

update();

</script>

</body>
</html>
