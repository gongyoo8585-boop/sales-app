<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>매출 관리 앱 (최종 완성)</title>

<style>
body { background:#111; color:#fff; font-family:sans-serif; padding:20px;}
.box { background:#222; padding:15px; margin:10px 0; border-radius:10px;}
input, select, button {
  width:100%; padding:10px; margin:5px 0;
  border:none; border-radius:5px;
}
button { background:#00ff88; font-weight:bold; }
.calendar { display:grid; grid-template-columns: repeat(7,1fr); gap:5px;}
.day { padding:10px; text-align:center; border-radius:5px; cursor:pointer;}
.high { background:#00aa55;}
.medium { background:#ffaa00;}
.low { background:#333;}
.empty { background:#111;}
</style>
</head>

<body>

<h2>🔥 매출 관리 앱 (완성)</h2>

<div class="box">
날짜 <input type="date" id="date">
구분
<select id="type">
<option value="매출">매출</option>
<option value="지출">지출</option>
</select>
제목 <input id="title">
직원 <input id="staff">
금액 <input type="number" id="amount">

<button onclick="save()">저장</button>
<button onclick="resetData()" style="background:red;">전체삭제</button>
</div>

<div class="box">
📊 요약<br><br>
👥 고객 건수: <span id="customerCount">0</span><br>
👨‍💼 직원 건수: <span id="staffCount">0</span><br>
💰 총 순이익: <span id="profit">0</span>
</div>

<div class="box">
📊 직원별 성과 (건수 + 수익)
<canvas id="staffChart"></canvas>
</div>

<div class="box">
📅 월 선택
<input type="month" id="monthPicker" onchange="update()">
</div>

<div class="box">
📅 달력
<div id="calendar" class="calendar"></div>
</div>

<div class="box">
📌 날짜 상세
<div id="detail"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

let data = JSON.parse(localStorage.getItem("data")) || [];

const COMMISSION = 30000; // 🔥 1건당 수익

function save(){
  let item = {
    date: document.getElementById("date").value,
    type: document.getElementById("type").value,
    title: document.getElementById("title").value,
    staff: document.getElementById("staff").value || "미입력",
    amount: Number(document.getElementById("amount").value)||0
  };

  if(!item.date || !item.title || item.amount==0){
    alert("입력하세요");
    return;
  }

  data.push(item);
  localStorage.setItem("data", JSON.stringify(data));
  update();

  // 입력 초기화
  document.getElementById("title").value="";
  document.getElementById("staff").value="";
  document.getElementById("amount").value="";
}

function resetData(){
  if(confirm("삭제?")){
    data=[];
    localStorage.removeItem("data");
    update();
  }
}

function showDetail(dateStr){
  let html="", total=0;

  data.forEach(d=>{
    if(d.date===dateStr){
      total+=d.amount;
      html+=`<div>${d.type} | ${d.title} | ${d.staff} | ${d.amount}</div>`;
    }
  });

  html+=`<hr>총합: ${total}`;
  document.getElementById("detail").innerHTML=html;
}

function update(){

  let monthInput = document.getElementById("monthPicker");
  let month = monthInput.value || new Date().toISOString().slice(0,7);
  monthInput.value = month;

  let customerCount=0;
  let staffCount=0;
  let dateSum={};

  let staffCountMap={};
  let income=0;
  let expense=0;

  data.forEach(d=>{

    if(d.type==="매출"){
      income+=d.amount;

      if(d.date.startsWith(month)){
        customerCount++;
        dateSum[d.date]=(dateSum[d.date]||0)+d.amount;
      }

    }else{
      expense+=d.amount;

      if(d.date.startsWith(month)){
        staffCount++;
      }

      // 직원 건수
      if(!staffCountMap[d.staff]) staffCountMap[d.staff]=0;
      staffCountMap[d.staff]++;
    }

  });

  // 순이익 계산
  let profit = income - expense;

  document.getElementById("customerCount").innerText = customerCount;
  document.getElementById("staffCount").innerText = staffCount;
  document.getElementById("profit").innerText = profit.toLocaleString();

  // 직원 그래프 (건수 + 수익)
  let names = Object.keys(staffCountMap);
  let counts = names.map(n=>staffCountMap[n]);
  let earnings = counts.map(c=>c * COMMISSION);

  if(window.c1) c1.destroy();
  c1 = new Chart(staffChart,{
    type:'bar',
    data:{
      labels:names,
      datasets:[
        {label:"건수", data:counts},
        {label:"수익", data:earnings}
      ]
    }
  });

  // 달력
  let year = +month.split("-")[0];
  let m2 = +month.split("-")[1]-1;

  let firstDay = new Date(year,m2,1).getDay();
  let lastDate = new Date(year,m2+1,0).getDate();

  let cal="";

  for(let i=0;i<firstDay;i++) cal+=`<div class="day empty"></div>`;

  for(let d=1; d<=lastDate; d++){
    let full = month+"-"+String(d).padStart(2,"0");
    let amount = dateSum[full]||0;

    let cls="low";
    if(amount > 500000) cls="high";
    else if(amount > 200000) cls="medium";

    cal+=`<div class="day ${cls}" onclick="showDetail('${full}')">
    ${d}<br>${amount||""}</div>`;
  }

  document.getElementById("calendar").innerHTML=cal;
}

update();

</script>

</body>
</html>
